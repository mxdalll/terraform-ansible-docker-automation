---
- name: Install Docker on EC2
  hosts: web
  become: yes

  tasks:

    - name: Update packages
      dnf:
        name: "*"
        state: latest
        update_only: yes

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes